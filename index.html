<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>矮袋鼠30歲生日快樂 🎂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --ink:    #1a1a2e;
  --ink2:   #2d2d44;
  --sage:   #7c9a7e;
  --sage-l: #b8d4ba;
  --peach:  #f2a97e;
  --peach-l:#fde8d8;
  --cream:  #faf7f2;
  --warm:   #f5efe6;
  --line:   rgba(26,26,46,.12);
  --accent: #e8724a;
  --gold:   #d4a853;
}

html, body { height: 100%; overflow: hidden; background: var(--cream); }
body { font-family: "DM Sans", "Noto Serif TC", sans-serif; color: var(--ink); }

/* ── PAGES ── */
.page {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2rem 1.5rem 5.5rem;
  opacity: 0; pointer-events: none;
  transition: opacity .55s ease, transform .55s cubic-bezier(.4,0,.2,1);
  transform: translateY(24px);
  overflow-y: auto;
}
.page.active  { opacity: 1; pointer-events: all; transform: translateY(0); }
.page.exit    { opacity: 0; transform: translateY(-24px); pointer-events: none; }

/* ── DECORATIVE SVG LINES (background) ── */
.page::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    url("data:image/svg+xml,%3Csvg width='400' height='600' viewBox='0 0 400 600' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='340' cy='80' r='120' stroke='%237c9a7e' stroke-width='1' stroke-dasharray='4 8' opacity='.25'/%3E%3Ccircle cx='60' cy='500' r='90' stroke='%23e8724a' stroke-width='1' stroke-dasharray='4 8' opacity='.18'/%3E%3Cline x1='0' y1='300' x2='400' y2='300' stroke='%231a1a2e' stroke-width='.5' opacity='.06'/%3E%3C/svg%3E");
  background-size: cover;
  pointer-events: none;
  z-index: 0;
}
.page > * { position: relative; z-index: 1; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 1rem 1.5rem 1.6rem;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to top, var(--cream) 65%, transparent);
  z-index: 200;
}
.ndots { display: flex; gap: 6px; align-items: center; }
.ndot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--line); border: 1.5px solid var(--ink2);
  transition: all .3s; cursor: pointer; opacity: .35;
}
.ndot.on { width: 22px; border-radius: 3px; background: var(--ink); opacity: 1; border-color: var(--ink); }

.next-btn {
  font-family: "DM Sans", sans-serif; font-weight: 600; font-size: .88rem;
  letter-spacing: .04em;
  background: var(--ink); color: var(--cream);
  border: none; border-radius: 100px;
  padding: .6rem 1.5rem;
  cursor: pointer; display: flex; align-items: center; gap: .35rem;
  transition: transform .15s, background .2s;
  box-shadow: 0 2px 12px rgba(26,26,46,.18);
}
.next-btn:active { transform: scale(.95); }
.next-btn.fin { background: var(--sage); }

.prev-btn {
  font-family: "DM Sans", sans-serif; font-weight: 500; font-size: .82rem;
  background: transparent; border: 1.5px solid var(--line);
  color: var(--ink2); border-radius: 100px; padding: .55rem 1.1rem;
  cursor: pointer; transition: opacity .2s;
}
.prev-btn:active { opacity: .5; }
.prev-btn.hidden { visibility: hidden; }

/* ── SECTION LABEL ── */
.label {
  font-family: "DM Sans", sans-serif; font-size: .7rem; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--sage); margin-bottom: .5rem; text-align: center;
}
.display-title {
  font-family: "DM Serif Display", "Noto Serif TC", serif;
  font-size: 2rem; line-height: 1.15; color: var(--ink);
  text-align: center; margin-bottom: .4rem;
}
.display-title em { font-style: italic; color: var(--accent); }
.body-text {
  font-size: .88rem; line-height: 1.7; color: var(--ink2);
  text-align: center; font-weight: 300; max-width: 280px;
}

/* ── TYPEWRITER ── */
.cursor {
  display: inline-block; width: 1.5px; height: 1em;
  background: var(--accent); margin-left: 1px;
  vertical-align: middle; animation: curBlink .65s step-end infinite;
}
@keyframes curBlink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── PAGE 0: HERO ── */
#p0 { background: var(--cream); }
.hero-img-wrap {
  width: 200px; margin: 0 auto .8rem;
  animation: popIn .9s cubic-bezier(.34,1.56,.64,1) both;
}
.hero-img-wrap img { width: 100%; display: block; }
@keyframes popIn {
  0%   { transform: scale(.4) translateY(40px); opacity: 0; }
  60%  { transform: scale(1.06) translateY(-4px); opacity: 1; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}

.hero-tag {
  display: inline-flex; align-items: center; gap: .4rem;
  border: 1.5px solid var(--ink); border-radius: 100px;
  padding: .3rem .9rem; font-size: .75rem; font-weight: 600;
  letter-spacing: .06em; color: var(--ink); margin-bottom: 1rem;
  animation: fadeUp .6s .3s both;
}
.hero-name {
  font-family: "DM Serif Display", serif;
  font-size: 2.2rem; text-align: center; line-height: 1.1;
  color: var(--ink); margin-bottom: .4rem;
  animation: fadeUp .6s .5s both;
}
.hero-name span { color: var(--accent); font-style: italic; }
.hero-sub {
  font-size: .84rem; color: var(--ink2); font-weight: 300;
  text-align: center; line-height: 1.7;
  animation: fadeUp .6s .7s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── PAGE 1: MEMORIES ── */
#p1 {
  background: var(--warm);
  justify-content: flex-start;
  padding: 2rem 0 5.5rem;
}
#p1 .label, #p1 .display-title, #p1 .deco-line, #p1 .count-lbl {
  padding: 0 1.5rem;
}

/* 河道容器：橫向捲動 */
.album-strip-wrap {
  width: 100%;
  overflow-x: scroll;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: .6rem 1.25rem 1rem;
  cursor: grab;
}
.album-strip-wrap::-webkit-scrollbar { display: none; }
.album-strip-wrap.grabbing { cursor: grabbing; }

/* 河道軌道：橫向排列 */
.album-strip {
  display: flex;
  flex-direction: row;
  gap: .75rem;
  width: max-content;
  align-items: flex-start;
}

/* 每張直式照片卡 */
.strip-card {
  border: 1.5px solid var(--ink);
  box-shadow: 3px 3px 0 var(--ink);
  border-radius: 6px;
  overflow: hidden;
  width: 52vw;
  max-width: 220px;
  flex-shrink: 0;
  transition: transform .15s, box-shadow .15s;
}
.strip-card:active {
  transform: translate(2px,2px);
  box-shadow: 1px 1px 0 var(--ink);
}
.strip-frame {
  width: 100%;
  aspect-ratio: 3/4;
  background: var(--peach-l);
  overflow: hidden;
  position: relative;
}
.strip-frame img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.strip-ph {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; opacity: .35; color: var(--ink2);
}
.strip-ph svg { width: 36px; }
.strip-ph p { font-size: .68rem; font-weight: 700; letter-spacing: .08em; }

/* 進度條 */
.strip-progress-wrap {
  padding: .3rem 1.25rem 0;
  width: 100%;
}
.strip-progress-bar {
  height: 2px; background: var(--line);
  border-radius: 2px; overflow: hidden;
}
.strip-progress-fill {
  height: 100%; background: var(--ink);
  border-radius: 2px; transition: width .2s ease;
  width: 0%;
}
.count-lbl { font-size: .72rem; font-weight: 600; letter-spacing: .08em; color: var(--ink2); text-align: center; margin-bottom: .5rem; opacity: .6; }
.count-lbl span { color: var(--ink); font-weight: 700; opacity: 1; }

/* ── PAGE 2: LETTER ── */
#p2 { background: var(--cream); }
.letter-wrap {
  width: 100%; max-width: 360px;
  background: #fff;
  border: 1.5px solid var(--ink);
  box-shadow: 5px 5px 0 var(--ink);
  border-radius: 2px;
  padding: 1.8rem 1.5rem 1.5rem;
  margin-top: 1.5rem; position: relative;
}
.letter-corner {
  position: absolute; top: 0; right: 0;
  width: 0; height: 0;
  border-style: solid;
  border-width: 0 32px 32px 0;
  border-color: transparent var(--cream) transparent transparent;
}
.letter-corner::after {
  content: '';
  position: absolute; top: 2px; right: -30px;
  width: 0; height: 0;
  border-style: solid;
  border-width: 0 28px 28px 0;
  border-color: transparent var(--peach-l) transparent transparent;
}
.letter-from {
  font-size: .65rem; font-weight: 600; letter-spacing: .14em;
  text-transform: uppercase; color: var(--sage); margin-bottom: 1rem;
  display: flex; align-items: center; gap: .5rem;
}
.letter-from::after { content: ''; flex: 1; height: 1px; background: var(--sage-l); }
.letter-body {
  font-family: "Noto Serif TC", serif;
  font-size: .88rem; line-height: 2; color: var(--ink2);
  white-space: pre-wrap; min-height: 7rem;
}
.letter-sign {
  margin-top: 1.2rem; text-align: right;
  font-family: "DM Serif Display", serif; font-style: italic;
  color: var(--accent); font-size: 1.1rem;
  opacity: 0; transition: opacity .6s;
}
.letter-sign.show { opacity: 1; }

/* ── PAGE 3: CARDS ── */
#p3 { background: var(--warm); }
.cards-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: .75rem; width: 100%; max-width: 360px; margin-top: .9rem;
}
.wcard {
  background: #fff;
  border: 1.5px solid var(--ink);
  box-shadow: 3px 3px 0 var(--ink);
  border-radius: 2px;
  padding: 1.1rem .9rem;
  text-align: center; cursor: pointer;
  min-height: 128px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: transform .12s, box-shadow .12s;
}
.wcard:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
.wcard.flipped { background: var(--ink); border-color: var(--ink); box-shadow: none; }
.wcard-front { display: flex; flex-direction: column; align-items: center; gap: .4rem; }
.wcard-icon { font-size: 1.9rem; }
.wcard-hint { font-size: .63rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--ink2); opacity: .45; }
.wcard-back { display: none; font-size: .76rem; font-weight: 400; color: var(--cream); line-height: 1.65; }
.wcard.flipped .wcard-front { display: none; }
.wcard.flipped .wcard-back { display: block; }
.cards-note { font-size: .72rem; color: var(--ink2); text-align: center; margin-top: .6rem; opacity: .45; letter-spacing: .04em; }

/* ── PAGE 4: GIFT ── */
#p4 { background: var(--cream); }
.gift-outer {
  display: flex; flex-direction: column; align-items: center; gap: .7rem;
}
.gift-box-wrap {
  cursor: pointer; position: relative;
  width: 120px; height: 130px;
  transition: transform .2s;
}
.gift-box-wrap:active { transform: scale(.96); }
.gift-body {
  position: absolute; bottom: 0; left: 0;
  width: 100%; height: 88px;
  background: var(--peach);
  border: 2px solid var(--ink);
  border-radius: 2px;
}
.gift-rv { position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 14px; height: 100%; background: var(--gold); }
.gift-rh { position: absolute; top: 50%; left: 0; transform: translateY(-50%); width: 100%; height: 14px; background: var(--gold); }
.gift-lid {
  position: absolute; top: 0; left: -6%; width: 112%; height: 36px;
  background: var(--accent); border: 2px solid var(--ink); border-radius: 2px;
  z-index: 2; transition: all .5s cubic-bezier(.34,1.56,.64,1);
}
.gift-lid-r { position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 14px; height: 100%; background: var(--gold); }
.gift-bow { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 1.9rem; z-index: 3; }
.gift-open .gift-lid { transform: translateY(-54px) rotate(-15deg); opacity: 0; }
.gift-stars { position: absolute; inset: 0; pointer-events: none; overflow: visible; }
.sstar { position: absolute; font-size: 1.3rem; opacity: 0; left: 50%; top: 50%; }
.gift-open .sstar { animation: starPop .9s ease forwards; }
@keyframes starPop {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:0; }
  60%  { opacity:1; }
  100% { transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(1); opacity:0; }
}
.gift-tap { font-size: .75rem; color: var(--ink2); font-weight: 500; letter-spacing: .06em; opacity: .5; }
.gift-reveal {
  background: #fff; border: 1.5px solid var(--ink);
  box-shadow: 5px 5px 0 var(--ink);
  border-radius: 2px; padding: 1.4rem 1.2rem;
  max-width: 310px; width: 100%; text-align: center;
  opacity: 0; transform: translateY(14px);
  transition: all .5s .3s; display: none;
}
.gift-reveal.show { opacity: 1; transform: translateY(0); display: block; }
.gift-reveal h3 {
  font-family: "DM Serif Display", serif; font-size: 1.3rem;
  color: var(--ink); margin-bottom: .7rem;
}
.gift-reveal p { font-size: .86rem; color: var(--ink2); line-height: 1.8; font-weight: 300; }
.gift-btn {
  display: block; width: 100%; margin-top: 1rem;
  background: var(--ink); color: var(--cream);
  font-family: "DM Sans", sans-serif; font-weight: 600; font-size: .86rem;
  letter-spacing: .04em; padding: .7rem; border-radius: 100px;
  border: none; cursor: pointer;
}

/* ── CONFETTI ── */
.cf {
  position: fixed; top: -12px;
  border-radius: 2px;
  animation: cfFall linear forwards;
  pointer-events: none; z-index: 999;
}
@keyframes cfFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

/* ── DECORATIVE LINE ── */
.deco-line {
  width: 40px; height: 1.5px; background: var(--sage);
  margin: .5rem auto;
}
</style>
</head>

  <button class="prev-btn hidden" id="prevBtn" onclick="goPage(cur-1)">← 返回</button>

</div>

不管怎樣的你，我都喜歡

30歲生日快樂。
往後的每一年，都希望能一起慶生，
一起走過更多美好的日子。`;

const wishes = [
  {icon:'🌊', text:'我們可以在東海岸旁邊看看海~'},
  {icon:'🏔️', text:'欣賞花東縱谷景色，山與海的距離近得讓人屏息。'},
  {icon:'🌾', text:'池上伯朗大道!!!。'},

];

// ── PAGE SYSTEM ──
const PAGES = ['p0','p1','p2','p3','p4'];
let cur = 0, typing = false;

const ndots = document.getElementById('ndots');
PAGES.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'ndot' + (i===0?' on':'');
  d.onclick = () => goPage(i);
  ndots.appendChild(d);
});

function goPage(n) {
  if (n < 0 || n >= PAGES.length || typing) return;
  const leaving = document.getElementById(PAGES[cur]);
  const arriving = document.getElementById(PAGES[n]);
  // Fade out current
  leaving.classList.add('exit');
  // After exit anim, hide it and show next
  setTimeout(() => {
    leaving.classList.remove('active', 'exit');
    cur = n;
    // Force reflow so CSS transition triggers properly
    void arriving.offsetHeight;
    arriving.classList.add('active');
    updateNav();
    onPageEnter(cur);
    document.querySelectorAll('.ndot').forEach((d,i) => d.classList.toggle('on', i===cur));
  }, 420);
}

function updateNav() {
  document.getElementById('prevBtn').classList.toggle('hidden', cur===0);
  const nb = document.getElementById('nextBtn');
  if (cur === PAGES.length-1) {
    nb.innerHTML = '🎊 完成'; nb.classList.add('fin');
    nb.onclick = launchConfetti;
  } else {
    nb.innerHTML = '繼續 <span>→</span>'; nb.classList.remove('fin');
    nb.onclick = () => goPage(cur+1);
  }
}

// ── TYPEWRITER ──
let twTimer = null;
function typeWrite(el, text, speed=32, onDone) {
  if (twTimer) clearInterval(twTimer);
  typing = true; el.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor'; el.appendChild(cursor);
  let i = 0;
  twTimer = setInterval(() => {
    if (i < text.length) {
      const ch = text[i++];
      el.insertBefore(ch === '\n' ? document.createElement('br') : document.createTextNode(ch), cursor);
    } else {
      clearInterval(twTimer); typing = false;
      setTimeout(() => cursor.remove(), 700);
      if (onDone) onDone();
    }
  }, speed);
}

let letterDone = false;
function onPageEnter(n) {
  if (n === 2 && !letterDone) {
    letterDone = true;
    const sign = document.getElementById('letterSign');
    sign.classList.remove('show');
    typeWrite(document.getElementById('letterBody'), LETTER, 32, () => {
      setTimeout(() => sign.classList.add('show'), 400);
    });
  }
}

// ── ALBUM STRIP ──
(function buildStrip() {
  const strip = document.getElementById('albumStrip');
  const wrap  = document.getElementById('albumStripWrap');
  const fill  = document.getElementById('stripFill');
  const numEl = document.getElementById('slideNum');
  const totEl = document.getElementById('slideTotal');

  totEl.textContent = photos.length;

  photos.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'strip-card';
    card.innerHTML = `
      <div class="strip-frame">
        ${p.src
          ? `<img src="${p.src}" alt="回憶${i+1}" loading="lazy">`
          : `<div class="strip-ph">
               <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                 <rect x="4" y="4" width="32" height="32" rx="2" stroke="currentColor" stroke-width="1.5"/>
                 <circle cx="20" cy="18" r="6" stroke="currentColor" stroke-width="1.5"/>
                 <circle cx="30" cy="10" r="2" fill="currentColor"/>
               </svg>
               <p>PHOTO ${i+1}</p>
             </div>`}
      </div>`;
    strip.appendChild(card);
  });

  // Update progress + current index on scroll
  wrap.addEventListener('scroll', () => {
    const maxScroll = wrap.scrollWidth - wrap.clientWidth;
    const pct = maxScroll > 0 ? wrap.scrollLeft / maxScroll : 0;
    fill.style.width = (pct * 100) + '%';
    // Estimate which card is most visible
    const cardW = 160 + 12; // width + gap
    const idx = Math.min(photos.length - 1, Math.round(wrap.scrollLeft / cardW));
    numEl.textContent = idx + 1;
  }, { passive: true });

  // Drag to scroll on desktop
  let isDown = false, startX = 0, scrollLeft = 0;
  wrap.addEventListener('mousedown', e => {
    isDown = true; wrap.classList.add('grabbing');
    startX = e.pageX - wrap.offsetLeft; scrollLeft = wrap.scrollLeft;
  });
  wrap.addEventListener('mouseleave', () => { isDown = false; wrap.classList.remove('grabbing'); });
  wrap.addEventListener('mouseup',    () => { isDown = false; wrap.classList.remove('grabbing'); });
  wrap.addEventListener('mousemove',  e => {
    if (!isDown) return;
    e.preventDefault();
    wrap.scrollLeft = scrollLeft - (e.pageX - wrap.offsetLeft - startX) * 1.2;
  });
})();

// ── CARDS ──
(function buildCards(){
  const g = document.getElementById('cardsGrid');
  wishes.forEach(w => {
    const c = document.createElement('div');
    c.className = 'wcard';
    c.innerHTML = `<div class="wcard-front"><div class="wcard-icon">${w.icon}</div><div class="wcard-hint">點我翻開</div></div><div class="wcard-back">${w.text}</div>`;
    c.onclick = function(){ if(!this.classList.contains('flipped')) this.classList.add('flipped'); };
    g.appendChild(c);
  });
})();

// ── GIFT ──
function openGift(){
  const b=document.getElementById('giftBox'), r=document.getElementById('giftReveal');
  if(b.classList.contains('gift-open')) return;
  b.classList.add('gift-open');
  document.getElementById('giftTap').style.display='none';
  ['🌟','✨','🎉','💛','🌸','🎊','💐'].forEach((s,i)=>{
    const el=document.createElement('div'); el.className='sstar';
    const a=(i/7)*Math.PI*2;
    el.style.cssText=`--tx:${Math.cos(a)*85}px;--ty:${Math.sin(a)*85}px;animation-delay:${i*.08}s`;
    el.textContent=s; document.getElementById('giftStars').appendChild(el);
  });
  setTimeout(()=>{r.style.display='block';requestAnimationFrame(()=>r.classList.add('show'));},500);
}

// ── CONFETTI ──
function launchConfetti(){
  const cols=['#e8724a','#d4a853','#7c9a7e','#1a1a2e','#f2a97e','#b8d4ba'];
  for(let i=0;i<65;i++){
    const c=document.createElement('div'); c.className='cf';
    c.style.cssText=`left:${Math.random()*100}vw;background:${cols[i%cols.length]};width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.8+Math.random()*2}s;animation-delay:${Math.random()*.6}s`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),5000);
  }
}
